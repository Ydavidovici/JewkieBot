name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: engines/jewkiebot

    steps:
      - uses: actions/checkout@v4

      - name: Add MinGW to PATH
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"

      - name: Build
        shell: pwsh
        run: cmake --build build --target jewkiebot -j4

      - name: Stage artifact
        shell: pwsh
        run: |
          $artifact = "jewkiebot-${{ github.ref_name }}-windows-x64.exe"
          Copy-Item build\jewkiebot.exe $artifact
          echo "ARTIFACT=$artifact" >> $env:GITHUB_ENV
          echo "ARTIFACT_PATH=engines/jewkiebot/$artifact" >> $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_PATH }}
